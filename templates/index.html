<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Progresión Financiera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-emerald-400 mb-2">📊 Progresión Financiera Compuesta</h1>
            <p class="text-gray-400">Proyectá el crecimiento de tus trades aplicando interés compuesto</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start max-w-5xl mx-auto">
            
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl lg:col-span-1">
                <h2 class="text-xl font-semibold mb-4 text-gray-200">Simulación</h2>
                <form id="form-calculadora" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Capital Inicial ($)</label>
                        <input type="number" id="capital" value="50" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Profit per Trade (%)</label>
                        <input type="number" id="profit" value="10" step="0.1" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Cantidad de Trades</label>
                        <input type="number" id="trades" value="10" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                    </div>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2.5 px-4 rounded-lg transition duration-200 shadow-md">
                        Calcular Progresión
                    </button>
                </form>
            </div>

            <div id="contenedor-resultados" class="hidden lg:col-span-2 space-y-8">
                
                <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4 text-emerald-400">📈 Curva de Crecimiento</h2>
                    <div class="w-full h-64">
                        <canvas id="graficoProgresion"></canvas>
                    </div>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl overflow-hidden">
                    <h2 class="text-xl font-semibold mb-4 text-emerald-400">📋 Historial de Progresión</h2>
                    <div class="overflow-x-auto max-h-60 overflow-y-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-800 text-gray-400 text-sm sticky top-0 bg-gray-900">
                                    <th class="py-3 px-4">Trade #</th>
                                    <th class="py-3 px-4">B. Inicial</th>
                                    <th class="py-3 px-4">Profit ($)</th>
                                    <th class="py-3 px-4">B. Final</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpo-tabla" class="divide-y divide-gray-800/50 text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let miGrafico = null; // Variable para controlar el gráfico y que no se duplique

        document.getElementById('form-calculadora').addEventListener('submit', async (e) => {
            e.preventDefault();

            const capital = parseFloat(document.getElementById('capital').value);
            const profit = parseFloat(document.getElementById('profit').value);
            const trades = parseInt(document.getElementById('trades').value);

            const respuesta = await fetch('/calcular', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    capital_inicial: capital,
                    porcentaje_profit: profit,
                    total_trades: trades
                })
            });

            const resultado = await respuesta.json();

            if (resultado.status === 'success') {
                const cuerpoTabla = document.getElementById('cuerpo-tabla');
                cuerpoTabla.innerHTML = '';

                // Listas auxiliares para darle los datos al gráfico
                const etiquetasTrades = [];
                const datosBalances = [];

                resultado.data.forEach(fila => {
                    // 1. Llenamos la tabla
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-800/30 transition';
                    tr.innerHTML = `
                        <td class="py-3 px-4 font-medium text-gray-400">${fila.trade}</td>
                        <td class="py-3 px-4">$ ${fila.balance_inicial.toLocaleString('es-AR')}</td>
                        <td class="py-3 px-4 text-emerald-400">+$ ${fila.profit.toLocaleString('es-AR')}</td>
                        <td class="py-3 px-4 text-white font-semibold">$ ${fila.balance_final.toLocaleString('es-AR')}</td>
                    `;
                    cuerpoTabla.appendChild(tr);

                    // 2. Guardamos datos para el gráfico
                    etiquetasTrades.push(`Trade ${fila.trade}`);
                    datosBalances.push(fila.balance_final);
                });

                // Mostrar el contenedor derecho
                document.getElementById('contenedor-resultados').classList.remove('hidden');

                // 3. RENDERIZAR O ACTUALIZAR EL GRÁFICO
                const ctx = document.getElementById('graficoProgresion').getContext('2d');
                
                // Si el gráfico ya existía de un cálculo anterior, lo destruimos para dibujar el nuevo
                if (miGrafico) { miGrafico.destroy(); }

                miGrafico = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: etiquetasTrades,
                        datasets: [{
                            label: 'Balance de la Cuenta ($)',
                            data: datosBalances,
                            borderColor: '#34d399', // Verde esmeralda
                            backgroundColor: 'rgba(52, 211, 153, 0.1)', // Sombreado abajo de la línea
                            borderWidth: 2,
                            tension: 0.3, // Curvatura de la línea
                            pointRadius: trades > 30 ? 0 : 3 // Esconde los puntitos si son demasiados trades
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { grid: { color: 'rgba(75, 85, 99, 0.1)' }, ticks: { color: '#9ca3af' } },
                            y: { grid: { color: 'rgba(75, 85, 99, 0.1)' }, ticks: { color: '#9ca3af' } }
                        },
                        plugins: {
                            legend: { display: false } // Esconde etiquetas repetitivas
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
